services:
  dev:
    image: oven/bun:latest
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: bun run dev -- --host 0.0.0.0
    profiles:
      - dev

  prod:
    build:
      context: .
      target: production
    ports:
      - "80:80"
    profiles:
      - prod
